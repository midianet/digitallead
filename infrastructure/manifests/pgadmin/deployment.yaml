apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgadmin
  namespace: dl-infra
  labels:
    app.kubernetes.io/name: pgadmin
    app.kubernetes.io/part-of: digitallead-platform
    app.kubernetes.io/version: "9.14"
spec:
  replicas: 1

  strategy:
    type: Recreate

  selector:
    matchLabels:
      app.kubernetes.io/name: pgadmin

  template:
    metadata:
      labels:
        app.kubernetes.io/name: pgadmin
        app.kubernetes.io/part-of: digitallead-platform
        digitallead.com.br/id: PLT-102
        digitallead.com.br/owner: platform

    spec:
      securityContext:
        fsGroup: 5050
        fsGroupChangePolicy: OnRootMismatch

      containers:
        - name: pgadmin
          image: dpage/pgadmin4:9.14
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 80
              protocol: TCP

          envFrom:
            - secretRef:
                name: pgadmin-auth

          env:
            - name: PGADMIN_DISABLE_POSTFIX
              value: "true"

            - name: PGADMIN_SERVER_JSON_FILE
              value: /pgadmin4/servers.json

          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi

          securityContext:
            runAsNonRoot: true
            runAsUser: 5050
            runAsGroup: 5050

          readinessProbe:
            httpGet:
              path: /misc/ping
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /misc/ping
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          volumeMounts:
            - name: data
              mountPath: /var/lib/pgadmin

            - name: servers
              mountPath: /pgadmin4/servers.json
              subPath: servers.json
              readOnly: true

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: pgadmin-data

        - name: servers
          configMap:
            name: pgadmin-servers
