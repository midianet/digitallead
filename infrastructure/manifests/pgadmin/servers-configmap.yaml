apiVersion: v1
kind: ConfigMap
metadata:
  name: pgadmin-servers
  namespace: dl-infra
  labels:
    app.kubernetes.io/name: pgadmin
    app.kubernetes.io/part-of: digitallead-platform
data:
  servers.json: |
    {
      "Servers": {
        "1": {
          "Name": "PostgreSQL Digitalead",
          "Group": "Digitalead",
          "Host": "postgresql.dl-database.svc.cluster.local",
          "Port": 5432,
          "MaintenanceDB": "postgres",
          "Username": "postgres",
          "SSLMode": "prefer"
        }
      }
    }
