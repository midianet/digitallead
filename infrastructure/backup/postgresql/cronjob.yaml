apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgresql-backup
  namespace: dl-database
  labels:
    app.kubernetes.io/name: postgresql-backup
    app.kubernetes.io/part-of: digitallead-platform
    digitallead.com.br/id: PLT-501
spec:
  schedule: "0 2 * * *"
  timeZone: America/Sao_Paulo

  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  startingDeadlineSeconds: 1800

  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 7200
      ttlSecondsAfterFinished: 86400

      template:
        metadata:
          labels:
            app.kubernetes.io/name: postgresql-backup
            app.kubernetes.io/part-of: digitallead-platform
            digitallead.com.br/id: PLT-501

        spec:
          restartPolicy: Never

          containers:
            - name: backup
              image: postgres:17.5-bookworm
              imagePullPolicy: IfNotPresent

              command:
                - /bin/bash
                - /scripts/backup.sh

              env:
                - name: POSTGRES_HOST
                  value: postgresql.dl-database.svc.cluster.local

                - name: POSTGRES_PORT
                  value: "5432"

                - name: POSTGRES_USER
                  value: postgres

                - name: BACKUP_ROOT
                  value: /backup/postgresql

                - name: RETENTION_DAYS
                  value: "7"

                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgresql-auth
                      key: postgres-password

              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: "1"
                  memory: 1Gi

              securityContext:
                runAsNonRoot: true
                runAsUser: 999
                runAsGroup: 999
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL

              volumeMounts:
                - name: backup
                  mountPath: /backup

                - name: scripts
                  mountPath: /scripts
                  readOnly: true

          volumes:
            - name: backup
              persistentVolumeClaim:
                claimName: postgresql-backup

            - name: scripts
              configMap:
                name: postgresql-backup-script
                defaultMode: 0550
