apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: retain-pvc-test
  namespace: dl-infra
  labels:
    app.kubernetes.io/name: retain-pvc-test
    app.kubernetes.io/part-of: digitallead-platform
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: dl-local-retain
  resources:
    requests:
      storage: 100Mi
---
apiVersion: v1
kind: Pod
metadata:
  name: retain-pvc-test
  namespace: dl-infra
  labels:
    app.kubernetes.io/name: retain-pvc-test
    app.kubernetes.io/part-of: digitallead-platform
spec:
  restartPolicy: Never
  containers:
    - name: busybox
      image: rancher/mirrored-library-busybox:1.37.0
      command:
        - sh
        - -c
        - |
          echo "Pod iniciado."
          sleep 86400
      resources:
        requests:
          cpu: 5m
          memory: 16Mi
        limits:
          cpu: 50m
          memory: 64Mi
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: retain-pvc-test
